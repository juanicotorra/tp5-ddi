    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

// Configuración de la API de Gemini
const apiKey = ""; // Se inyecta dinámicamente en tiempo de ejecución de manera segura

/**
 * Función auxiliar para realizar llamadas con reintentos y respaldo exponencial a Gemini
 */
async function consultarEspirituGemini(promptText) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
  
  const systemInstruction = "Eres el Sabio Espíritu del Bosque Alquímico VR. El jugador puede recoger plantas del piso y cajas misteriosas de cartón con sus manos virtuales para inspeccionarlas o guardarlas. Habla siempre con tono místico, sabio y amigable. Si tiene objetos en la bolsa o el caldero, inventa una poción poética combinándolos (por ejemplo, si introduce la caja de cartón, menciona cómo el espíritu del embalaje o el cartón rústico añade propiedades protectoras o sorpresas al elixir). Si no tiene nada, lánzale un corto y poético acertijo sobre la naturaleza. Máximo 75 palabras.";

  const payload = {
    contents: [{ parts: [{ text: promptText }] }],
    systemInstruction: { parts: [{ text: systemInstruction }] }
  };

  let delay = 1000;
  for (let i = 0; i < 5; i++) {
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error(`Error de red: ${response.status}`);
      const data = await response.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || "La brisa nocturna silba pero no trae respuestas todavía...";
    } catch (error) {
      if (i === 4) {
        return "El portal astral con Gemini se encuentra cerrado temporalmente por la niebla cósmica.";
      }
      await new Promise(resolve => setTimeout(resolve, delay));
      delay *= 2;
    }
  }
}

/**
 * Clase principal que gestiona la experiencia del bosque místico en VR,
 * las manos del explorador, objetos agarrables (incluyendo la caja) y la API de Gemini.
 */
class ForestScriptVR extends xb.Script {
  constructor() {
    super();
    this.plants = [];
    this.baggedCount = 0;
    this.totalPlants = 8;
    this.particles = [];
    this.treesToAnimate = [];
    this.time = 0;

    // Elementos del inventario
    this.baggedIngredients = [];
    this.cauldronIngredients = [];
    this.activeAnimations = [];

    // Elevamos sutilmente el nivel interactivo sobre el piso virtual (y = 0.22)
    // para que el usuario pueda interactuar cómodamente inclinándose un poco
    this.floorY = 0.22;
    this.cauldronPos = new THREE.Vector3(-0.35, this.floorY + 0.15, -0.65);
    this.bagPos = new THREE.Vector3(0.35, this.floorY + 0.11, -0.5);

    // Sistema de Teletransporte
    this.activeTeleportController = null;
    this.teleportTargetPos = new THREE.Vector3();
    this.teleportMarker = null;

    // Herramientas de Raycasting personalizadas para máxima precisión de selección y teletransporte
    this.raycaster = new THREE.Raycaster();
    this.tempMatrix = new THREE.Matrix4();

    // Referencias de UI
    this.uiPanel = null;
    this.uiScoreText = null;
    this.uiSubtitle = null;
    this.alchemyPanel = null;
    this.alchemyIngredientsText = null;
    this.alchemyResultText = null;
    this.alchemyBtn = null;

    // Componentes del Caldero e Iluminación
    this.liquidMesh = null;
    this.cauldronLight = null;
    this.targetLiquidColor = new THREE.Color(0x22c55e);
    this.currentLiquidColor = new THREE.Color(0x22c55e);

    // Estructuras de manos virtuales visibles
    this.handVisuals = {
      left: null,
      right: null
    };
  }

  init() {
    // Configuración obligatoria de VR puro: Forzar fondo opaco oscuro en la escena para anular AR passthrough
    const spaceDark = new THREE.Color(0x05080c);
    xb.core.scene.background = spaceDark;
    xb.core.renderer.setClearColor(spaceDark, 1.0);
    xb.core.renderer.setClearAlpha(1.0);

    // Ajustar la cámara para que esté más al nivel del suelo (Inmersión VR de césped)
    xb.core.user.height = 0.35;

    // Luz ambiental y solar
    const hemisphereLight = new THREE.HemisphereLight(0x4a3b5c, 0x111e12, 1.8);
    this.add(hemisphereLight);

    const sunLight = new THREE.DirectionalLight(0xfff3e0, 1.2);
    sunLight.position.set(5, 8, 2);
    this.add(sunLight);

    // Configuración de Niebla
    this.sceneFog = new THREE.FogExp2(0x05080c, 0.12);
    xb.core.scene.fog = this.sceneFog;

    // Crear cielo estrellado VR de 360 grados (No AR)
    this.createVRSky();

    // Crear piso y árboles
    this.createForestFloor();
    this.createBackgroundForest();
    
    // Crear recipientes
    this.createCauldron();
    this.createBag();

    // Spawn de las plantas del piso y la CAJA DE CARTÓN
    this.spawnPlants();

    // Crear interfaces de usuario espaciales curvas con estilo medieval
    this.createSpatialUI();

    // Crear las manos virtuales visibles y vincularlas directamente a los mandos XR de Three.js
    this.createVirtualHands();

    // Crear el marcador de teletransporte
    this.createTeleportMarker();

    // Escuchar eventos físicos de agarre
    this.onSelectStart = this.onSelectStart.bind(this);
    this.onSelectEnd = this.onSelectEnd.bind(this);
  }

  /**
   * Crea un domo de cielo nocturno VR de 360 grados (Atmósfera de Fantasía).
   */
  createVRSky() {
    const skyGeo = new THREE.SphereGeometry(25, 32, 15);
    skyGeo.scale(-1, 1, 1);

    const vertexShader = `
      varying vec3 vWorldPosition;
      void main() {
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPosition.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec3 vWorldPosition;
      void main() {
        float h = normalize(vWorldPosition).y;
        vec3 skyColor = vec3(0.02, 0.03, 0.08); // Azul noche profundo
        vec3 horizonColor = vec3(0.10, 0.04, 0.15); // Violeta medieval
        vec3 finalColor = mix(horizonColor, skyColor, max(h, 0.0));
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    const skyMat = new THREE.ShaderMaterial({
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.BackSide,
      depthWrite: false
    });

    const sky = new THREE.Mesh(skyGeo, skyMat);
    this.add(sky);

    // Estrellas flotantes en el cielo de fondo
    const starGeo = new THREE.BufferGeometry();
    const starCount = 350;
    const starPositions = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      const radius = 20 + Math.random() * 4;

      starPositions[i * 3] = Math.sin(phi) * Math.cos(theta) * radius;
      starPositions[i * 3 + 1] = Math.abs(Math.sin(phi) * Math.sin(theta) * radius);
      starPositions[i * 3 + 2] = Math.cos(phi) * radius;
    }

    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.06,
      transparent: true,
      opacity: 0.85
    });

    const starParticles = new THREE.Points(starGeo, starMat);
    this.add(starParticles);
  }

  /**
   * Genera las manos virtuales anatómicas visibles que flexionan sus dedos.
   */
  createVirtualHands() {
    const handMat = new THREE.MeshStandardMaterial({
      color: 0x3d2514, // Cuero medieval oscuro para guantes rústicos
      roughness: 0.9,
      metalness: 0.15
    });

    const cuffMat = new THREE.MeshStandardMaterial({ color: 0x5c3c21, roughness: 0.85 });

    const xr = xb.core.renderer.xr;

    ['left', 'right'].forEach((handName, idx) => {
      const handGroup = new THREE.Group();
      
      // Palma anatómica
      const palmGeo = new THREE.BoxGeometry(0.045, 0.015, 0.055);
      const palm = new THREE.Mesh(palmGeo, handMat);
      palm.position.set(0, 0, -0.015);
      handGroup.add(palm);

      // Muñequera de cuero
      const cuffGeo = new THREE.CylinderGeometry(0.026, 0.026, 0.04, 8);
      const cuff = new THREE.Mesh(cuffGeo, cuffMat);
      cuff.rotation.x = Math.PI / 2;
      cuff.position.set(0, 0, 0.025);
      handGroup.add(cuff);

      // Modelar los 5 dedos de manera realista y rústica
      const fingers = [];
      const fingerPositions = [-0.016, -0.005, 0.006, 0.016];
      const fingerLengths = [0.020, 0.022, 0.019, 0.015];

      // Dedos: índice, medio, anular, meñique
      fingerPositions.forEach((xPos, fIdx) => {
        const fLen = fingerLengths[fIdx];
        const fGroup = new THREE.Group();
        fGroup.position.set(xPos, 0, -0.04);
        
        const segment = new THREE.Mesh(new THREE.BoxGeometry(0.008, 0.008, fLen), handMat);
        segment.position.set(0, 0, -fLen / 2);
        fGroup.add(segment);
        
        handGroup.add(fGroup);
        fingers.push(fGroup);
      });

      // Dedo pulgar
      const thumbGroup = new THREE.Group();
      thumbGroup.position.set(idx === 0 ? -0.023 : 0.023, 0, -0.025);
      thumbGroup.rotation.y = idx === 0 ? -0.6 : 0.6;
      
      const thumbSegment = new THREE.Mesh(new THREE.BoxGeometry(0.008, 0.008, 0.018), handMat);
      thumbSegment.position.set(0, 0, -0.009);
      thumbGroup.add(thumbSegment);
      
      handGroup.add(thumbGroup);
      fingers.push(thumbGroup);

      // Guardamos referencias para animar flexión de dedos al agarrar
      handGroup.userData = { fingers: fingers, isLeft: idx === 0 };

      // Brillo místico guía
      const pointerGlow = new THREE.PointLight(0xa7f3d0, 0.3, 0.2);
      pointerGlow.position.set(0, 0, -0.06);
      handGroup.add(pointerGlow);

      this.handVisuals[handName] = handGroup;

      // ACOPLAMIENTO CRÍTICO: Añadir el grupo visual directamente como hijo del control XR de Three.js.
      const controller = xr.getController(idx);
      this.add(controller);
      controller.add(handGroup);
    });
  }

  /**
   * Crea el marcador visual para el sistema de teletransporte en el piso.
   */
  createTeleportMarker() {
    const ringGeo = new THREE.RingGeometry(0.2, 0.24, 32);
    ringGeo.rotation.x = -Math.PI / 2;
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0x8b5cf6, // Violeta místico
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.0 // Invisible por defecto
    });
    this.teleportMarker = new THREE.Mesh(ringGeo, ringMat);
    this.teleportMarker.position.y = this.floorY + 0.01;
    this.add(this.teleportMarker);
  }

  /**
   * Crea el piso forestal elevado.
   */
  createForestFloor() {
    const groundGeo = new THREE.CircleGeometry(15, 32);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x071108, // Tierra mística medieval oscura
      roughness: 0.95,
      metalness: 0.05,
    });
    this.groundMesh = new THREE.Mesh(groundGeo, groundMat);
    this.groundMesh.rotation.x = -Math.PI / 2;
    this.groundMesh.position.y = this.floorY;
    this.add(this.groundMesh);

    // Rocas místicas
    const stoneGeo = new THREE.DodecahedronGeometry(0.12, 1);
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0x1f221f, roughness: 0.9 });
    for (let i = 0; i < 22; i++) {
      const stone = new THREE.Mesh(stoneGeo, stoneMat);
      const angle = Math.random() * Math.PI * 2;
      const radius = 1.0 + Math.random() * 5.0;
      stone.position.set(Math.cos(angle) * radius, this.floorY + 0.02, Math.sin(angle) * radius);
      stone.scale.set(0.6 + Math.random() * 0.8, 0.3 + Math.random() * 0.5, 0.6 + Math.random() * 0.8);
      stone.rotation.set(Math.random(), Math.random(), Math.random());
      this.add(stone);
    }
  }

  /**
   * Crea árboles de fantasía alrededor del claro.
   */
  createBackgroundForest() {
    const trunkGeo = new THREE.CylinderGeometry(0.14, 0.22, 2.6, 8);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x180f08, roughness: 0.9 });
    const leavesGeo = new THREE.DodecahedronGeometry(0.7, 1);
    const leavesColors = [0x081507, 0x10250d, 0x051204];

    const numTrees = 26;
    for (let i = 0; i < numTrees; i++) {
      const treeGroup = new THREE.Group();
      
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = 1.3;
      treeGroup.add(trunk);

      const colorLeaves = leavesColors[Math.floor(Math.random() * leavesColors.length)];
      const leavesMat = new THREE.MeshStandardMaterial({ color: colorLeaves, roughness: 0.85 });
      
      const leafCount = 3 + Math.floor(Math.random() * 2);
      const foliageGroup = new THREE.Group();
      foliageGroup.position.y = 2.4;

      for (let j = 0; j < leafCount; j++) {
        const leaf = new THREE.Mesh(leavesGeo, leavesMat);
        leaf.position.set(
          (Math.random() - 0.5) * 0.3,
          j * 0.45 - 0.1,
          (Math.random() - 0.5) * 0.3
        );
        const s = 0.8 + Math.random() * 0.4;
        leaf.scale.set(s, s + 0.2, s);
        foliageGroup.add(leaf);
      }
      treeGroup.add(foliageGroup);

      const angle = (i / numTrees) * Math.PI * 2 + (Math.random() - 0.5) * 0.15;
      const radius = 2.4 + Math.random() * 2.8;
      treeGroup.position.set(Math.cos(angle) * radius, this.floorY, Math.sin(angle) * radius);
      
      const treeScale = 0.8 + Math.random() * 0.4;
      treeGroup.scale.set(treeScale, treeScale, treeScale);

      this.add(treeGroup);
      
      this.treesToAnimate.push({
        group: foliageGroup,
        speed: 1.1 + Math.random() * 1.3,
        offset: Math.random() * 12
      });
    }
  }

  /**
   * Crea el caldero alquímico en el piso.
   */
  createCauldron() {
    const cauldronGroup = new THREE.Group();
    cauldronGroup.position.copy(this.cauldronPos);

    const ironMat = new THREE.MeshStandardMaterial({ color: 0x0f1012, roughness: 0.75, metalness: 0.85 });
    const bowlGeo = new THREE.CylinderGeometry(0.2, 0.24, 0.18, 16);
    const bowl = new THREE.Mesh(bowlGeo, ironMat);
    bowl.position.y = 0.09;
    cauldronGroup.add(bowl);

    const rimGeo = new THREE.TorusGeometry(0.18, 0.02, 8, 24);
    const rim = new THREE.Mesh(rimGeo, ironMat);
    rim.rotation.x = Math.PI / 2;
    rim.position.y = 0.18;
    cauldronGroup.add(rim);

    // Patas
    const legGeo = new THREE.BoxGeometry(0.03, 0.06, 0.03);
    for (let i = 0; i < 3; i++) {
      const leg = new THREE.Mesh(legGeo, ironMat);
      const angle = (i / 3) * Math.PI * 2;
      leg.position.set(Math.cos(angle) * 0.16, 0.03, Math.sin(angle) * 0.16);
      leg.rotation.y = -angle;
      leg.rotation.z = 0.15;
      cauldronGroup.add(leg);
    }

    // Líquido hirviendo
    const liquidGeo = new THREE.CylinderGeometry(0.17, 0.17, 0.01, 16);
    this.liquidMat = new THREE.MeshStandardMaterial({
      color: 0x22c55e,
      emissive: 0x10532c,
      roughness: 0.15,
      metalness: 0.1
    });
    this.liquidMesh = new THREE.Mesh(liquidGeo, this.liquidMat);
    this.liquidMesh.position.y = 0.17;
    cauldronGroup.add(this.liquidMesh);

    // Luz de brillo
    this.cauldronLight = new THREE.PointLight(0x22c55e, 2.2, 1.0);
    this.cauldronLight.position.set(0, 0.2, 0);
    cauldronGroup.add(this.cauldronLight);

    this.add(cauldronGroup);
  }

  /**
   * Crea la Bolsa de Muestras mística de explorador.
   */
  createBag() {
    const bagGroup = new THREE.Group();
    bagGroup.position.copy(this.bagPos);

    const leatherMat = new THREE.MeshStandardMaterial({ color: 0x3d1d11, roughness: 0.9 });
    const goldMat = new THREE.MeshStandardMaterial({ color: 0xbfa15f, metalness: 0.8, roughness: 0.25 });

    // Bolsa de Cuero rústica medieval
    const bagBaseGeo = new THREE.BoxGeometry(0.18, 0.22, 0.13);
    const bagMesh = new THREE.Mesh(bagBaseGeo, leatherMat);
    bagMesh.position.y = 0.11;
    bagMesh.rotation.y = -0.4;
    bagGroup.add(bagMesh);

    // Hebilla mística dorada
    const buckleGeo = new THREE.BoxGeometry(0.03, 0.04, 0.02);
    const buckle = new THREE.Mesh(buckleGeo, goldMat);
    buckle.position.set(0.02, 0.10, 0.075);
    buckle.rotation.y = -0.4;
    bagGroup.add(buckle);

    this.bagLight = new THREE.PointLight(0xe9d5ff, 1.0, 0.7);
    this.bagLight.position.set(0, 0.22, 0);
    bagGroup.add(this.bagLight);

    this.add(bagGroup);
  }

  /**
   * Genera las plantas recolectables en el piso y LA CAJA DE CARTÓN AGARRABLE (según imagen).
   */
  spawnPlants() {
    this.plants.forEach(p => this.remove(p.group));
    this.plants = [];
    this.baggedIngredients = [];
    this.cauldronIngredients = [];
    this.baggedCount = 0;

    const plantTypes = [
      { name: 'Hongo de Fuego', color: 0xff3b3b, type: 'mushroom' },
      { name: 'Flor Estelar', color: 0xffd700, type: 'star' },
      { name: 'Orquídea de Maná', color: 0x2563eb, type: 'mana' },
      { name: 'Helecho Radiante', color: 0x10b981, type: 'fern' },
      // ¡LA CAJA DE CARTÓN interactiva! (según tu imagen, con un tamaño mayor, colisionador generoso, no rota sola)
      { name: 'Caja de Cartón', color: 0xc68a4c, type: 'carton_box' }
    ];

    for (let i = 0; i < this.totalPlants; i++) {
      const type = plantTypes[i % plantTypes.length];
      
      // Esparcir en un círculo cerrado accesible debido a que la altura está al nivel del piso
      const angle = (i / this.totalPlants) * Math.PI * 2 + (Math.random() - 0.5) * 0.25;
      const radius = 0.75 + Math.random() * 0.55; 
      
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      // Posición base sobre el suelo elevado
      const y = this.floorY + 0.01;

      const plantGroup = new THREE.Group();
      plantGroup.position.set(x, y, z);

      const visualGroup = new THREE.Group();
      let interactableRadius = 0.18;
      
      if (type.type === 'carton_box') {
        // --- MODELAR LA CAJA DE CARTÓN DE TU IMAGEN (Mayor tamaño: 0.28m, no rotará sola) ---
        const boxGroup = new THREE.Group();

        // 1. Cuerpo principal rústico marrón
        const boxGeo = new THREE.BoxGeometry(0.28, 0.28, 0.28);
        const boxMat = new THREE.MeshStandardMaterial({
          color: 0xc69666, // Marrón cartón rústico
          roughness: 0.95,
          metalness: 0.05
        });
        const boxBody = new THREE.Mesh(boxGeo, boxMat);
        boxBody.position.y = 0.14;
        boxGroup.add(boxBody);

        // 2. Cinta de embalaje marrón oscuro superior (solapa central)
        const tapeMat = new THREE.MeshStandardMaterial({
          color: 0x8a5522, // Marrón oscuro cinta de embalar
          roughness: 0.6
        });

        // Cinta del medio arriba
        const tapeTop = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.002, 0.282), tapeMat);
        tapeTop.position.set(0, 0.281, 0);
        boxGroup.add(tapeTop);

        // Cinta que cae por los costados delanteros/traseros
        const tapeFront = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.09, 0.002), tapeMat);
        tapeFront.position.set(0, 0.235, 0.141);
        boxGroup.add(tapeFront);

        const tapeBack = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.09, 0.002), tapeMat);
        tapeBack.position.set(0, 0.235, -0.141);
        boxGroup.add(tapeBack);

        // Cinta que cae por los costados laterales inferiores (según imagen)
        const tapeLeft = new THREE.Mesh(new THREE.BoxGeometry(0.002, 0.06, 0.05), tapeMat);
        tapeLeft.position.set(-0.141, 0.045, 0);
        boxGroup.add(tapeLeft);

        const tapeRight = new THREE.Mesh(new THREE.BoxGeometry(0.002, 0.06, 0.05), tapeMat);
        tapeRight.position.set(0.141, 0.045, 0);
        boxGroup.add(tapeRight);

        visualGroup.add(boxGroup);
        interactableRadius = 0.32; // Colisionador mayor para la caja de cartón
      } else {
        // Construir flora procedural estándar
        this.buildPlantGeometry(visualGroup, type);
      }

      plantGroup.add(visualGroup);

      const glowLight = new THREE.PointLight(type.color, 0.8, 0.5);
      glowLight.position.set(0, 0.15, 0);
      plantGroup.add(glowLight);

      // Colisionador generoso para manos o controles en VR
      const triggerGeo = new THREE.SphereGeometry(interactableRadius, 8, 8);
      const triggerMat = new THREE.MeshBasicMaterial({
        color: type.color,
        transparent: true,
        opacity: 0, 
        depthWrite: false
      });
      const triggerMesh = new THREE.Mesh(triggerGeo, triggerMat);
      triggerMesh.position.set(0, 0.08, 0);
      plantGroup.add(triggerMesh);

      this.add(plantGroup);

      this.plants.push({
        group: plantGroup,
        visuals: visualGroup,
        light: glowLight,
        triggerMesh: triggerMesh,
        type: type,
        collected: false,
        isBeingHeld: false,
        holdingHand: null,
        controllerRef: null,
        spawnPosition: new THREE.Vector3(x, y, z),
        bobOffset: Math.random() * 100,
        bobSpeed: 1.3 + Math.random() * 0.7,
        spinSpeed: 0.2 + Math.random() * 0.4
      });
    }
  }

  /**
   * Construye flora mágica procedural.
   */
  buildPlantGeometry(group, info) {
    const stemMat = new THREE.MeshStandardMaterial({ color: 0x163a18, roughness: 0.8 });
    const petalMat = new THREE.MeshStandardMaterial({ color: info.color, roughness: 0.5 });
    const innerMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });

    if (info.type === 'mushroom') {
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.03, 0.12, 8), stemMat);
      stem.position.y = 0.06;
      group.add(stem);

      const cap = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12, 0, Math.PI * 2, 0, Math.PI / 2), petalMat);
      cap.position.y = 0.11;
      cap.scale.set(1, 0.7, 1);
      group.add(cap);
    } else if (info.type === 'star') {
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.14, 8), stemMat);
      stem.position.y = 0.07;
      group.add(stem);

      const center = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), innerMat);
      center.position.y = 0.14;
      group.add(center);

      const petalGeo = new THREE.BoxGeometry(0.07, 0.005, 0.018);
      for (let k = 0; k < 5; k++) {
        const petal = new THREE.Mesh(petalGeo, petalMat);
        petal.position.set(0, 0.14, 0);
        petal.rotation.y = (k / 5) * Math.PI * 2;
        petal.translateOnAxis(new THREE.Vector3(1, 0, 0), 0.035);
        group.add(petal);
      }
    } else if (info.type === 'mana') {
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.12, 8), stemMat);
      stem.position.y = 0.06;
      group.add(stem);

      const petalGeo = new THREE.SphereGeometry(0.03, 8, 8);
      petalGeo.scale(1, 1.2, 0.5);
      for (let k = 0; k < 3; k++) {
        const petal = new THREE.Mesh(petalGeo, petalMat);
        petal.position.set(0, 0.12, 0);
        petal.rotation.y = (k / 3) * Math.PI * 2;
        petal.rotation.x = 0.3;
        petal.translateOnAxis(new THREE.Vector3(0, 0, 1), 0.025);
        group.add(petal);
      }
    } else {
      const leafCount = 4;
      const leafGeo = new THREE.CylinderGeometry(0.003, 0.014, 0.15, 5);
      leafGeo.translate(0, 0.07, 0);
      
      for (let k = 0; k < leafCount; k++) {
        const leaf = new THREE.Mesh(leafGeo, petalMat);
        leaf.position.set(0, 0.02, 0);
        leaf.rotation.z = 0.6;
        leaf.rotation.y = (k / leafCount) * Math.PI * 2;
        group.add(leaf);
      }
    }
  }

    });

    });

    this.alchemyIngredientsText = rightGrid.addRow({ weight: 0.15 }).addText({

      fontSize: 0.026,

    });

    const actionRow = rightGrid.addRow({ weight: 0.2 });

  /**
   * Determina cuál mano física/controlador de Three está llamando el evento.
   */
  detectHand(controller) {
    const p = new THREE.Vector3();
    controller.getWorldPosition(p);
    return p.x < 0 ? 'left' : 'right';
  }

  /**
   * Evento que se dispara al presionar el gatillo o pellizcar (Select Start).
   * Gestiona tanto el agarre perfecto con dedos articulados como el apuntado para teletransporte.
   */
  onSelectStart(event) {
    const controller = event.target;
    const hand = this.detectHand(controller);

    // 1. Intentar interactuar y agarrar un objeto del piso
    let pickedAnything = false;
    for (const plant of this.plants) {
      if (plant.collected || plant.isBeingHeld) continue;

      const intersection = xb.core.user.select(plant.triggerMesh, controller);
      if (intersection) {
        plant.isBeingHeld = true;
        plant.holdingHand = hand;
        plant.controllerRef = controller;

        // Ocultar temporalmente el puntero láser de selección para inmersión limpia de mano
        if (controller.children[0]) controller.children[0].visible = false;

        // ACOPLAMIENTO DE NODO: Hacer al objeto hijo del controlador para que rote exactamente con la muñeca
        controller.add(plant.group);
        
        // Ajustar posición local del objeto frente al guante para que se vea perfectamente en la palma
        plant.group.position.set(0, 0, -0.06);
        plant.group.rotation.set(0, 0, 0);

        // Cancelar animación autónoma de flotación en el piso
        plant.visuals.position.y = 0;

        // Animación de los Dedos: Cerrar dedos de la mano para simular un "Grip" rústico
        const hVis = this.handVisuals[hand];
        if (hVis && hVis.userData && hVis.userData.fingers) {
          hVis.userData.fingers.forEach(finger => {
            // Flexionar dedos rotándolos hacia adentro
            finger.rotation.x = -0.7;
          });
        }

        pickedAnything = true;
        break; 
      }
    }

    // 2. Si no interactúa con ningún objeto ni con la interfaz, activar la lógica de Teletransporte
    if (!pickedAnything) {
      // Usar raycasting místico contra el suelo
      this.tempMatrix.identity().extractRotation(controller.matrixWorld);
      this.raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      this.raycaster.ray.direction.set(0, 0, -1).applyMatrix4(this.tempMatrix);

      const intersects = this.raycaster.intersectObject(this.groundMesh);
      if (intersects.length > 0) {
        this.activeTeleportController = controller;
        this.teleportTargetPos.copy(intersects[0].point);
        
        // Posicionar y encender el marcador de teletransporte
        this.teleportMarker.position.copy(this.teleportTargetPos);
        this.teleportMarker.position.y = this.floorY + 0.01;
        this.teleportMarker.material.opacity = 0.8;
      }
    }
  }

  /**
   * Evento que se dispara al soltar el gatillo (Select End).
   * Ejecuta el teletransporte o deposita el objeto liberado.
   */
  onSelectEnd(event) {
    const controller = event.target;
    const hand = this.detectHand(controller);

    // 1. Evaluar si el controlador estaba cargando una trayectoria de teletransporte
    if (this.activeTeleportController === controller) {
      // Teletransportar al explorador a la posición exacta en el claro del bosque
      if (typeof xb.core.user.setPosition === 'function') {
        xb.core.user.setPosition(this.teleportTargetPos.x, xb.core.user.height, this.teleportTargetPos.z);
      } else {
        xb.core.user.position.set(this.teleportTargetPos.x, xb.core.user.height, this.teleportTargetPos.z);
      }

      // Ocultar el marcador
      this.teleportMarker.material.opacity = 0.0;
      this.activeTeleportController = null;
      return; // Saltar resto de lógica
    }

    // 2. Evaluar si soltó algún objeto
    for (const plant of this.plants) {
      if (plant.isBeingHeld && plant.controllerRef === controller) {
        plant.isBeingHeld = false;
        plant.holdingHand = null;
        plant.controllerRef = null;

        if (controller.children[0]) controller.children[0].visible = true;

        // Obtener posición del mundo real del objeto antes de desacoplarlo de la mano
        const currentPos = new THREE.Vector3();
        plant.group.getWorldPosition(currentPos);

        // DESACOPLAR: Devolver el objeto a la escena principal
        this.add(plant.group);
        plant.group.position.copy(currentPos);
        plant.group.rotation.set(0, 0, 0);

        const distToBag = currentPos.distanceTo(this.bagPos);
        const distToCauldron = currentPos.distanceTo(this.cauldronPos);

        if (distToBag < 0.28) {
          this.depositInBag(plant, currentPos);
        } else if (distToCauldron < 0.28) {
          this.depositInCauldron(plant, currentPos);
        } else {
          // Vuelve flotando majestuosamente a su lugar original
          this.returnPlantToSpawn(plant, currentPos);
        }

        // Animación de los Dedos: Abrir y relajar los dedos de la mano guante de nuevo
        const hVis = this.handVisuals[hand];
        if (hVis && hVis.userData && hVis.userData.fingers) {
          hVis.userData.fingers.forEach(finger => {
            finger.rotation.x = 0; // Dedos rectos de nuevo
          });
        }
        break;
      }
    }
  }

  /**
   * Guarda el objeto en la Bolsa de Muestras rústica.
   */
  depositInBag(plant, currentPos) {
    plant.collected = true;
    plant.triggerMesh.visible = false;
    this.baggedCount++;
    this.baggedIngredients.push(plant.type.name);

    this.activeAnimations.push({
      type: 'absorb_bag',
      plant: plant,
      startPos: currentPos.clone(),
      endPos: this.bagPos.clone().add(new THREE.Vector3(0, 0.08, 0)),
      startTime: this.time,
      duration: 0.45
    });

    this.uiScoreText.setText(`Muestras Guardadas: ${this.baggedCount} / ${this.totalPlants}`);
    this.alchemyIngredientsText.setText(`En la Bolsa: ${this.baggedIngredients.join(', ')}`);
    
    if (this.baggedCount === this.totalPlants) {
      this.uiSubtitle.setText('¡Colección de botánica medieval completada!');
    } else {
      this.uiSubtitle.setText(`Bolsa: ¡Has guardado un espécimen de ${plant.type.name}!`);
    }

    this.spawnSparks(this.bagPos.clone().add(new THREE.Vector3(0, 0.12, 0)), 0xe9d5ff);
  }

  /**
   * Deposita el objeto directamente en el Caldero de Alquimia.
   */
  depositInCauldron(plant, currentPos) {
    plant.collected = true;
    plant.triggerMesh.visible = false;
    this.cauldronIngredients.push(plant.type.name);

    this.activeAnimations.push({
      type: 'absorb_cauldron',
      plant: plant,
      startPos: currentPos.clone(),
      endPos: this.cauldronPos.clone().add(new THREE.Vector3(0, 0.18, 0)),
      startTime: this.time,
      duration: 0.45
    });

    this.targetLiquidColor.setHex(plant.type.color);
    this.spawnSparks(this.cauldronPos.clone().add(new THREE.Vector3(0, 0.18, 0)), plant.type.color);
    
    this.uiSubtitle.setText(`Alquimia: ¡Poured ${plant.type.name} en el caldero!`);
  }

  /**
   * Retorna flotando a su posición original en el suelo.
   */
  returnPlantToSpawn(plant, currentPos) {
    this.activeAnimations.push({
      type: 'return_spawn',
      plant: plant,
      startPos: currentPos.clone(),
      endPos: plant.spawnPosition.clone(),
      startTime: this.time,
      duration: 0.7
    });
  }

  /**
   * Genera chispas místicas flotantes.
   */
  spawnSparks(pos, colorHex) {
    const particleCount = 12;
    const pGeo = new THREE.SphereGeometry(0.012, 4, 4);
    const pMat = new THREE.MeshBasicMaterial({ color: colorHex });

    for (let i = 0; i < particleCount; i++) {
      const spark = new THREE.Mesh(pGeo, pMat);
      spark.position.copy(pos);
      this.add(spark);

      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      const velocity = new THREE.Vector3(
        Math.sin(phi) * Math.cos(theta) * (0.4 + Math.random() * 0.5),
        (0.6 + Math.random() * 0.8), 
        Math.sin(phi) * Math.sin(theta) * (0.4 + Math.random() * 0.5)
      );

      this.particles.push({
        mesh: spark,
        velocity: velocity,
        life: 1.0, 
        decay: 1.4 + Math.random() * 1.5
      });
    }
  }

  /**
   * Llama a Gemini para formular la poción mística.
   */
  async runAlchemicalBrewing() {
    this.alchemyResultText.setText('✨ El Espíritu de Gemini está sintiendo la vibración física de los ingredientes...');
    this.alchemyBtn.setFontColor('#edd6c4');
    this.alchemyBtn.setBackgroundColor('#3d1d11');

    let prompt = "";
    if (this.baggedIngredients.length === 0 && this.cauldronIngredients.length === 0) {
      prompt = "No tengo nada en la bolsa ni en el caldero todavía. Háblame de los misterios cósmicos de este bosque nocturno estrellado y lánzame un corto acertijo medieval de botánica.";
    } else {
      const bolsaTexto = this.baggedIngredients.length > 0 ? this.baggedIngredients.join(', ') : 'Ninguno';
      const calderoTexto = this.cauldronIngredients.length > 0 ? this.cauldronIngredients.join(', ') : 'Ninguno';
      
      prompt = `El explorador ha recolectado en su bolsa: ${bolsaTexto}, y ha depositado en su caldero físico de alquimia: ${calderoTexto}. Si contiene la "Caja de Cartón" (basada en una caja de embalaje con cinta), describe cómo el misterio y el empaque rústico de la caja de cartón añade propiedades protectoras de sorpresa al elixir medieval. Formula una poción poética.`;
    }

    const respuestaMistica = await consultarEspirituGemini(prompt);
    this.alchemyResultText.setText(respuestaMistica);

    this.alchemyBtn.setFontColor('#f7ebd3');
    this.alchemyBtn.setBackgroundColor('#7a2214');
  }

  /**
   * Reinicia la experiencia completa de realidad virtual.
   */
  resetExperience() {
    this.spawnPlants();

    this.uiScoreText.setText(`Muestras Guardadas: 0 / ${this.totalPlants}`);
    this.uiSubtitle.setText('¡Toma las plantas o la caja del suelo con tus manos y examínalas rotando tu muñeca!');
    
    this.alchemyIngredientsText.setText('En la Bolsa: Ninguno');
    this.alchemyResultText.setText('Coloca ingredientes en la bolsa de cuero o viértelos en el caldero, luego pulsa para invocar la destilación dinámica con la API de Gemini.');
    this.targetLiquidColor.setHex(0x22c55e);
  }

  /**
   * Bucle lógico de renderizado fotograma a fotograma.
   */
  update() {
    const dt = xb.getDeltaTime();
    this.time += dt;

    // 1. Animación del viento en las copas de los árboles de fantasía
    this.treesToAnimate.forEach(t => {
      const angleX = Math.sin(this.time * t.speed + t.offset) * 0.025;
      const angleZ = Math.cos(this.time * t.speed * 0.85 + t.offset) * 0.025;
      t.group.rotation.set(angleX, 0, angleZ);
    });

    // 2. Visibilidad inteligente de las manos según el estado de la sesión XR
    const xr = (xb.core.renderer && xb.core.renderer.xr) ? xb.core.renderer.xr : null;
    ['left', 'right'].forEach(handName => {
      const visual = this.handVisuals[handName];
      if (visual && xr) {
        visual.visible = xr.isPresenting || true;
      }
    });

    // 3. Actualizar la trayectoria dinámica del marcador de teletransporte si está activo
    if (this.activeTeleportController) {
      this.tempMatrix.identity().extractRotation(this.activeTeleportController.matrixWorld);
      this.raycaster.ray.origin.setFromMatrixPosition(this.activeTeleportController.matrixWorld);
      this.raycaster.ray.direction.set(0, 0, -1).applyMatrix4(this.tempMatrix);

      const intersects = this.raycaster.intersectObject(this.groundMesh);
      if (intersects.length > 0) {
        this.teleportTargetPos.copy(intersects[0].point);
        this.teleportMarker.position.copy(this.teleportTargetPos);
        this.teleportMarker.position.y = this.floorY + 0.01;
      }
    }

    // 4. Animación autónoma de flotación en las flores (Evitando rotación en la CAJA DE CARTÓN)
    this.plants.forEach(p => {
      if (!p.collected && !p.isBeingHeld) {
        if (p.type.type !== 'carton_box') {
          // La flora mágica flota y gira
          p.visuals.position.y = Math.sin(this.time * p.bobSpeed + p.bobOffset) * 0.015 + 0.012;
          p.visuals.rotation.y += p.spinSpeed * dt;
          p.light.intensity = 0.6 + Math.sin(this.time * 2.2 + p.bobOffset) * 0.2;
        } else {
          // La caja de cartón rústica de tu imagen permanece sólida y quieta en el suelo
          p.visuals.position.y = 0;
          p.visuals.rotation.set(0, 0, 0);
          p.light.intensity = 0.5;
        }
      }
    });

    // 5. Suavizado en la transición de color del líquido del caldero
    if (!this.currentLiquidColor.equals(this.targetLiquidColor)) {
      this.currentLiquidColor.lerp(this.targetLiquidColor, 0.05);
      this.liquidMat.color.copy(this.currentLiquidColor);
      this.liquidMat.emissive.copy(this.currentLiquidColor).multiplyScalar(0.4);
      this.cauldronLight.color.copy(this.currentLiquidColor);
    }

    // 6. Procesamiento de las animaciones activas (Regreso, Absorciones de bolsas y caldero)
    for (let i = this.activeAnimations.length - 1; i >= 0; i--) {
      const anim = this.activeAnimations[i];
      const elapsed = this.time - anim.startTime;
      const progress = Math.min(elapsed / anim.duration, 1.0);

      const t = progress * progress;

      const currentPos = new THREE.Vector3().lerpVectors(anim.startPos, anim.endPos, t);
      anim.plant.group.position.copy(currentPos);

      // Al regresar al spawn, restaurar suavemente su rotación base
      if (anim.type === 'return_spawn') {
        const targetQuat = new THREE.Quaternion(); // Rotación neutral orientada hacia el horizonte
        anim.plant.group.quaternion.slerp(targetQuat, 0.08);
      }

      if (anim.type.startsWith('absorb')) {
        const s = 1.0 - t;
        anim.plant.visuals.scale.setScalar(s);
        anim.plant.light.intensity = s;
      }

      if (progress >= 1.0) {
        if (anim.type.startsWith('absorb')) {
          anim.plant.group.visible = false;
        }
        this.activeAnimations.splice(i, 1);
      }
    }

    // 7. Motor de partículas físicas místicas
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life -= dt * p.decay;

      if (p.life <= 0) {
        this.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
        this.particles.splice(i, 1);
      } else {
        p.mesh.position.addScaledVector(p.velocity, dt);
        p.velocity.y -= 2.0 * dt; // Gravedad del bosque
        p.mesh.scale.setScalar(p.life);
      }
    }
  }
}
